<!DOCTYPE html>
<html lang="en">
<head>
    <title>Registration From</title>
</head>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<body>
      <input type="text" id="name" name="name" placeholder="Enter Name"><br>
      <input type="number"  name="age" id="age" placeholder="Enter Age"><br>
      <input type="number" id="mp_no" name=mobilno placeholder="Enter Mobile_NO"><br>
      <input type="email" id="email" name="email" placeholder="Enter Email"><br>
      <input type="password" id="password" name="password" placeholder="Enter password"><br>
      <button type="submit" id="btn1">submit</button>
      <p id="result"></p>
    
      <script>
        $("btn1").ready(function(){
            let name =$("#name").val()
            let age =$("#age").val()
            let mobilno =$("#mobilno").val()
            let email =$("#email").val()
         $.ajax({
              url:"insert.php",
              type:"POST",
              data:{name:name,age:age,mobilno:mobilno,email:email,password:password},
              success:function(data){
                $("#result").html(data);

              }
               


         });
         
        });
      </script>


</body>

</html>
