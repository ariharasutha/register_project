<!DOCTYPE html>
<html lang="en">

<head>

<title>AJAX Form</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

<input type="text"
id="name"
placeholder="Enter Name">

<br><br>

<input type="number"
id="age"
placeholder="Enter Age">

<br><br>

<input type="number"
id="mobilno"
placeholder="Enter Mobile No">

<br><br>

<input type="email"
id="email"
placeholder="Enter Email">

<br><br>

<input type="password"
id="password"
placeholder="Enter Password">

<br><br>

<button type="button" id="btn1">
Submit
</button>

<p id="result"></p>

<script>

$("#btn1").click(function(){

let name=$("#name").val();
let age=$("#age").val();
let mobilno=$("#mobilno").val();
let email=$("#email").val();
let password=$("#password").val();

$.ajax({

url:"insert.php",

type:"POST",

data:{
    name:name,
    age:age,
    mobilno:mobilno,
    email:email,
    password:password
},

success:function(data){

$("#result").html(data);

}

});

});

</script>

</body>

</html>
